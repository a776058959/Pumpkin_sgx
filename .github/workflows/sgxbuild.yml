name: Sync and Build Pumpkin (Multi-Platform)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'   # 每 2 小时运行一次（UTC 时间）

jobs:
  # 同步上游，判断是否有更新（操作 master 分支）
  sync:
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
      commits_base64: ${{ steps.commits.outputs.commits_base64 }}
    steps:
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: master          # 关键：检出 master 分支
          fetch-depth: 0

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/Pumpkin-MC/Pumpkin.git
          git fetch upstream

      - name: Check for updates (from master)
        id: check
        run: |
          NEW_COMMITS_COUNT=$(git rev-list --count HEAD..upstream/master)
          echo "📊 上游新提交数量: $NEW_COMMITS_COUNT"
          if [ "$NEW_COMMITS_COUNT" -gt 0 ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: Get upstream commits (if updates exist)
        id: commits
        if: steps.check.outputs.has_updates == 'true'
        run: |
          COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD..upstream/master)
          echo "📝 从 git log 获取到的提交列表："
          echo "$COMMITS"
          if [ -z "$COMMITS" ]; then
            COMMITS="（无详细提交信息，可能为合并提交）"
          fi
          # Base64 编码
          ENCODED=$(echo "$COMMITS" | base64 -w 0)
          echo "commits_base64=$ENCODED" >> $GITHUB_OUTPUT

      - name: Merge upstream changes into master
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git merge upstream/master --no-edit --allow-unrelated-histories
          git push origin master

  # 编译（仅当有更新时运行，仍然使用 master 代码）
  build:
    needs: sync
    if: needs.sync.outputs.has_updates == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            suffix: x86_64
            rustflags: ""
            linker: ""
            pkgs: ""

          - target: x86_64-unknown-linux-gnu
            suffix: x86_64-legacy
            rustflags: "-C target-cpu=core2"
            linker: ""
            pkgs: ""

          - target: aarch64-unknown-linux-gnu
            suffix: aarch64
            rustflags: ""
            linker: "aarch64-linux-gnu-gcc"
            pkgs: "gcc-aarch64-linux-gnu"

    steps:
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: master          # 关键：检出 master 分支

      - name: Set build date and time
        id: datetime
        run: |
          UTC_DATE=$(date -u +'%Y%m%d')
          UTC_TIME=$(date -u +'%H%M')
          BEIJING_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')
          echo "utc_date=$UTC_DATE" >> $GITHUB_OUTPUT
          echo "utc_time=$UTC_TIME" >> $GITHUB_OUTPUT
          echo "beijing=$BEIJING_TIME" >> $GITHUB_OUTPUT

      - name: Install cross compilation tools
        if: matrix.pkgs != ''
        run: sudo apt update && sudo apt install -y ${{ matrix.pkgs }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Configure linker for aarch64
        if: matrix.linker != ''
        run: |
          mkdir -p ~/.cargo
          echo "[target.${{ matrix.target }}]" >> ~/.cargo/config.toml
          echo "linker = \"${{ matrix.linker }}\"" >> ~/.cargo/config.toml

      - name: Build
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pumpkin-server-${{ matrix.suffix }}-${{ steps.datetime.outputs.utc_date }}
          path: target/${{ matrix.target }}/release/pumpkin

  # 统一发布 Release（仅当有更新时运行）
  release:
    needs: build
    if: needs.sync.outputs.has_updates == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Decode upstream commits
        id: decode_commits
        run: |
          ENCODED="${{ needs.sync.outputs.commits_base64 }}"
          if [ -n "$ENCODED" ]; then
            DECODED=$(echo "$ENCODED" | base64 -d)
            echo "📌 解码后的提交列表："
            echo "$DECODED"
            echo "commits<<EOF" >> $GITHUB_OUTPUT
            echo "$DECODED" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "commits=" >> $GITHUB_OUTPUT
          fi

      - name: Get build timestamp
        id: timestamp
        run: |
          UTC_DATE=$(date -u +'%Y%m%d')
          UTC_TIME=$(date -u +'%H%M')
          BEIJING_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')
          echo "utc_date=$UTC_DATE" >> $GITHUB_OUTPUT
          echo "utc_time=$UTC_TIME" >> $GITHUB_OUTPUT
          echo "beijing=$BEIJING_TIME" >> $GITHUB_OUTPUT

      - name: Prepare release files
        run: |
          mkdir -p release_files
          for dir in artifacts/pumpkin-server-*; do
            if [ -f "$dir/pumpkin" ]; then
              suffix=$(basename "$dir" | sed 's/^pumpkin-server-//')
              cp "$dir/pumpkin" "release_files/pumpkin-$suffix"
            fi
          done
          ls -la release_files

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: Custom-${{ steps.timestamp.outputs.utc_date }}-${{ steps.timestamp.outputs.utc_time }}
          name: Custom Build ${{ steps.timestamp.outputs.utc_date }}-${{ steps.timestamp.outputs.utc_time }}
          body: |
            自动构建，上游提交：${{ github.sha }}
            构建时间：${{ steps.timestamp.outputs.beijing }} UTC+8

            ----------------------------------------
            ${{ steps.decode_commits.outputs.commits }}
            ----------------------------------------

            下载链接（在 Release 附件中）：
            - `pumpkin-x86_64-${{ steps.timestamp.outputs.utc_date }}` – 标准 x86_64 构建
            - `pumpkin-x86_64-legacy-${{ steps.timestamp.outputs.utc_date }}` – 为旧 CPU 优化 (target-cpu=core2)
            - `pumpkin-aarch64-${{ steps.timestamp.outputs.utc_date }}` – ARM64 Linux 构建
          artifacts: "release_files/*"
          allowUpdates: false
          token: ${{ secrets.GITHUB_TOKEN }}